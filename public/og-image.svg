<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle decorative circles -->
  <circle cx="150" cy="500" r="200" fill="#bae6fd" opacity="0.15"/>
  <circle cx="1050" cy="130" r="180" fill="#fde68a" opacity="0.15"/>
  
  <!-- Heart icon -->
  <g transform="translate(555, 120) scale(0.9)">
    <path d="M50 88 C25 65, 2 45, 2 28 A24 24 0 0 1 50 20 A24 24 0 0 1 98 28 C98 45, 75 65, 50 88Z" fill="url(#heart)" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#0c4a6e" letter-spacing="-1">CalmMyself</text>
  
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#0369a1">Your personal calm toolbox</text>
  
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="500" fill="#64748b">36+ free evidence-based tools</text>
  
  <!-- Bottom accent line -->
  <rect x="500" y="480" width="200" height="3" rx="1.5" fill="#0ea5e9" opacity="0.5"/>
  
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#94a3b8">calmmyself.com</text>
</svg>
